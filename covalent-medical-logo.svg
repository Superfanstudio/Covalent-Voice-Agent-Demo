<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 132" font-family="'Arial Rounded MT Bold','Helvetica Neue',Arial,system-ui,sans-serif">
  <defs>
    <linearGradient id="cvWord" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#525c66"/>
      <stop offset=".46" stop-color="#2b333b"/>
      <stop offset=".56" stop-color="#1c232a"/>
      <stop offset="1" stop-color="#3b454f"/>
    </linearGradient>
    <linearGradient id="cvSwoosh" x1="430" y1="14" x2="360" y2="104" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#62c7f6"/>
      <stop offset=".5" stop-color="#1f8fe8"/>
      <stop offset="1" stop-color="#1146bd"/>
    </linearGradient>
  </defs>

  <!-- Wordmark -->
  <text x="2" y="80" font-size="74" font-weight="800" letter-spacing="-3" fill="url(#cvWord)">Covalent</text>
  <text x="6" y="110" font-size="17.5" font-weight="700" letter-spacing="9" fill="#5b6671">MEDICAL</text>

